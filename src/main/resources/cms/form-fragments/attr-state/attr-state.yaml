kind: "FormFragment"
title: "Attr: State (checkbox)"
form:
  - type: "RadioButton"
    name: "state"
    label: "Initial state"
    occurrences:
      min: 0
      max: 1
    options:
      - value: "unchecked"
        label: "Unchecked"
      - value: "checked"
        label: "Checked"
      - value: "indeterminate"
        label: "Indeterminate"
    default: "unchecked"
    helpText: "[Optional] Set the initial state of the checkbox. Default value is 'Unchecked', while it can also be set to 'Checked' or 'Indeterminate'. (An inbetween-option, to force the user to select or unselect.)"
